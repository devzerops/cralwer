services:
  redis:
    image: "redis:latest"
    ports:
      - "6379:6379"
      
  elastic:
    image: "elasticsearch:latest"
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - "discovery.type=single-node"
  
  kafka:
    image: "wurstmeister/kafka"
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_LISTENERS: "PLAINTEXT://localhost:9092"
  
  mysql:
    image: "mysql:latest"
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "test"

  server:
    build: ./cmd/server
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production

  worker:
    build: ./cmd/worker
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=production